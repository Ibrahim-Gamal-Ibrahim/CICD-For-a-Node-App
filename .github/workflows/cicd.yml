name: Deploy Node App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-app:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/node-app:latest

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/node-app:latest

          docker stop node-app || true
          docker rm node-app || true

          docker system prune -f || true

          docker run -d -p 3030:3000 \
            --env-file /home/ubuntu/.env \
            --name node-app \
            ${{ secrets.DOCKER_USERNAME }}/node-app:latest